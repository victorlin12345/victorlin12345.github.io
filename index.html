<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #indexVideo {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
        }
    </style>
</head>

<body>
    <video autoplay muted loop id="indexVideo">
        <source autoplay src="https://res.cloudinary.com/dqqtpvsau/video/upload/v1707577139/samples/cld-sample-video.mp4" type="video/mp4">
    </video>
</body>

<script>
    var video = document.getElementById("indexVideo");
    function myFunction() {
      if (video.paused) {
        video.play();
      }
    }
    </script>
</html>
