<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #indexVideo {
            min-width: 100vw;
            min-height: 100vh;
        }

        body{
            margin: 0;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        body::after {
            content: "";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 100;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            color: white;
            font-size: 2rem;
            transition-duration: .5s;
        }

        .content *{
            margin: 0;
            line-height: 1;
        }
       
        .content:hover {
            font-size: 3rem;
            line-height: 3rem;
        }
    </style>
</head>

<body>
    <video autoplay muted loop id="indexVideo">
        <source src="https://github.com/victorlin12345/victorlin12345.github.io/raw/master/sparks.mp4" type="video/mp4">
    </video>
    <div class="content">
        <h1>SPARKS</h1>
        <p>2024 to be continue</p>
    </div>
</body>

<script>
    var video = document.getElementById("indexVideo");
    function myFunction() {
        if (video.paused) {
            video.play();
        }
    }
</script>

</html>
